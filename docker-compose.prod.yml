services:
  app:
    build:
      args:
        INSTALL_XDEBUG: "false"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "0"
    restart: always

  nginx:
    restart: always

  queue:
    restart: always

  scheduler:
    restart: always

  mailpit:
    profiles:
      - dev
